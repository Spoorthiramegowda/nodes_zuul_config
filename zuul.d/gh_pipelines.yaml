---
- pipeline:
    name: check
    description: Newly uploaded patchsets enter this pipeline to receive an initial check status.
    manager: independent
    trigger:
      zuultesting2:
        - event: pull_request
          action:
            - opened
            - changed
            - reopened
        - event: pull_request
          action: comment
          comment: (?i)^\s*recheck\s*$
        - event: check_run
          action: rerequested
          check: .*/check:.*
    start:
      zuultesting2:
        check: 'in_progress'
        comment: false
    success:
      zuultesting2:
        check: 'success'
        comment: false
    failure:
      zuultesting2:
        check: 'failure'
        comment: false
    dequeue:
      zuultesting2:
        check: cancelled
        comment: false

- pipeline:
    name: gate
    description: Changes that have been approved by core developers are enqueued in order in this pipeline, and if they pass tests, will be merged.
    manager: dependent
    precedence: high
    supercedes: check
    require:
      zuultesting2:
        review:
          - permission: write
            type: approved
        label: gate
        open: true
        current-patchset: true
    trigger:
      zuultesting2:
        - event: pull_request_review
          action: submitted
          state:
            - approved
        - event: pull_request
          action: comment
          comment: (?i)^\s*regate\s*$
        - event: pull_request_review
          action: dismissed
          state:
            - changes_requested
        - event: pull_request
          action: status
          status: ".*:success"
        - event: check_run
          action: rerequested
          check: .*/gate:.*
        - event: pull_request
          action: labeled
          label:
            - gate
    start:
      zuultesting2:
        check: 'in_progress'
        comment: false
    success:
      zuultesting2:
        check: 'success'
        comment: false
        merge: true
    failure:
      zuultesting2:
        check: 'failure'
        comment: false
    dequeue:
      zuultesting2:
        check: cancelled
        comment: false
    window-floor: 20
    window-increase-factor: 2

- pipeline:
    name: post
    post-review: true
    description: This pipeline runs jobs that operate after each change is merged.
    manager: independent
    precedence: low
    trigger:
      zuultesting2:
        - event: push
          ref: ^refs/heads/.*$

- pipeline:
    name: tag
    description: This pipeline runs jobs in response to any tag event.
    manager: independent
    precedence: high
    post-review: true
    trigger:
      zuultesting2:
        - event: push
          ref: ^refs/tags/.*$

- pipeline:
    name: pre-release
    description: This pipeline runs jobs when a pre-release tag is pushed.
    manager: independent
    precedence: high
    post-review: true
    trigger:
      zuultesting2:
        - event: push
          ref: '^refs/tags/(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*)|((?:[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))$'
    start:
      zuultesting2:
        check: 'in_progress'
        comment: false
    success:
      zuultesting2:
        check: 'success'
        comment: false
    failure:
      zuultesting2:
        check: 'failure'
        comment: false
    dequeue:
      zuultesting2:
        check: cancelled
        comment: false

- pipeline:
    name: release
    description: This pipeline runs jobs when a final release tag is pushed.
    manager: independent
    precedence: high
    post-review: true
    trigger:
      zuultesting2:
        - event: push
          ref: '^refs/tags/(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$'
    start:
      zuultesting2:
        check: 'in_progress'
        comment: false
    success:
      zuultesting2:
        check: 'success'
        comment: false
    failure:
      zuultesting2:
        check: 'failure'
        comment: false
    dequeue:
      zuultesting2:
        check: cancelled
        comment: false

- pipeline:
    name: daily
    description: Daily run at 12 AM every day (including weekends)
    manager: independent
    trigger:
      timer:
        - time: "0 0 * * *"  # 12:00 AM every day
    start:
      zuultesting2:
        check: 'in_progress'
        comment: false
    success:
      zuultesting2:
        check: 'success'
        comment: false
    failure:
      zuultesting2:
